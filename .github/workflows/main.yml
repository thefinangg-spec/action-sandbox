name: Secure Ubuntu Runner Setup

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to create'
        required: true
        type: string
      password:
        description: 'Password for the user'
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Mask Sensitive Inputs
      run: |
        echo "::add-mask::${{ inputs.username }}"
        echo "::add-mask::${{ inputs.password }}"
        echo "Sensitive data masked"
        
    - name: Install OpenSSH Server
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server
        sudo systemctl enable --now ssh
        
    - name: Create User (Password Hidden)
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        # Create user
        sudo useradd -m -s /bin/bash -G sudo "${USERNAME}"
        
        # Set password without echoing to logs
        echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
        
        # Force password change on first login (optional but secure)
        # sudo passwd -e "${USERNAME}"
        
        # Verify but don't show sensitive data
        echo "User ${USERNAME} added to sudo group"
        
    - name: Run Tailscale Container
      env:
        TS_AUTH_KEY: ${{ secrets.TS_AUTH_KEY }}
      run: |
        sudo docker run -d \
          --name=tailscaled \
          -v /var/lib:/var/lib \
          -v /dev/net/tun:/dev/net/tun \
          --network=host \
          --cap-add=NET_ADMIN \
          --cap-add=NET_RAW \
          --env TS_AUTHKEY="${TS_AUTH_KEY}" \
          --env TS_EXTRA_ARGS=--ssh \
          tailscale/tailscale
          
        sleep 10
        
    - name: Display Connection Info
      run: |
        TS_IP=$(sudo docker exec tailscaled tailscale ip -4)
        
        cat << EOF
        ╔════════════════════════════════════════════╗
        ║         ✅ SETUP COMPLETE ✅                ║
        ╠════════════════════════════════════════════╣
        ║ User:        ${{ inputs.username }}        ║
        ║ SSH Status:  Active                        ║
        ║ Tailscale IP: ${TS_IP}                     ║
        ╠════════════════════════════════════════════╣
        ║ Connect via:                               ║
        ║ ssh ${{ inputs.username }}@${TS_IP}        ║
        ╚════════════════════════════════════════════╝
        EOF
        
        echo "tailscale_ip=${TS_IP}" >> $GITHUB_OUTPUT
        
    - name: Debug (Optional - Shows masked values as ***)
      if: runner.debug == '1'
      run: |
        echo "Username length: ${{ github.event.inputs.username }} | wc -c"
        echo "Password set: Yes (masked)"

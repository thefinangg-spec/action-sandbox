name: UBUNTU SSH - VIA TAILSCALE

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to create'
        required: true
        type: string
      password:
        description: 'Password for the user'
        required: true
        type: string
      duration_hours:
        description: 'Hours to keep alive'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
          - '8'

jobs:
  setup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Mask Sensitive Inputs
      run: |
        echo "::add-mask::${{ inputs.username }}"
        echo "::add-mask::${{ inputs.password }}"
        echo "Sensitive data masked"
        
    - name: Install OpenSSH Server
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server
        sudo systemctl enable --now ssh
        
    - name: Create User (Password Hidden)
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        # Create user
        sudo useradd -m -s /bin/bash -G sudo "${USERNAME}"
        
        # Set password without echoing to logs
        echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
        
        echo "User ${USERNAME} added to sudo group"
        
    - name: Run Tailscale Container
      env:
        TS_AUTH_KEY: ${{ secrets.TS_AUTH_KEY }}
      run: |
        sudo docker run -d \
          --name=tailscaled \
          -v /var/lib:/var/lib \
          -v /dev/net/tun:/dev/net/tun \
          --network=host \
          --cap-add=NET_ADMIN \
          --cap-add=NET_RAW \
          --env TS_AUTHKEY="${TS_AUTH_KEY}" \
          --env TS_EXTRA_ARGS=--ssh \
          tailscale/tailscale
          
        sleep 10
        
    - name: Display Connection Info
      run: |
        TS_IP=$(sudo docker exec tailscaled tailscale ip -4)
        
        cat << EOF
        ╔══════════════════════════════════════════════════════════╗
        ║              🚀 RUNNER IS ACTIVE 🚀                       ║
        ╠══════════════════════════════════════════════════════════╣
        ║ User:        ${{ inputs.username }}                      ║
        ║ SSH Status:  Active                                      ║
        ║ Tailscale IP: ${TS_IP}                                   ║
        ╠══════════════════════════════════════════════════════════╣
        ║ Connect via:                                             ║
        ║ ssh ${{ inputs.username }}@${TS_IP}                      ║
        ╠══════════════════════════════════════════════════════════╣
        ║ ⏰ This runner will stay alive for ${{ inputs.duration_hours }} hours ║
        ║ 🛑 Cancel job in GitHub UI to stop early                 ║
        ╚══════════════════════════════════════════════════════════╝
        EOF
        
        echo "tailscale_ip=${TS_IP}" >> $GITHUB_OUTPUT
        
    - name: Keep Alive with Heartbeat
      run: |
        DURATION_HOURS=${{ inputs.duration_hours }}
        END_TIME=$(date -d "+${DURATION_HOURS} hours" +%s)
        
        echo "⏳ Keeping runner alive for ${DURATION_HOURS} hours..."
        echo "💡 You can now SSH into this runner using the IP above"
        echo ""
        
        while [ $(date +%s) -lt $END_TIME ]; do
          REMAINING=$((END_TIME - $(date +%s)))
          HOURS=$((REMAINING / 3600))
          MINUTES=$(((REMAINING % 3600) / 60))
          SECONDS=$((REMAINING % 60))
          
          echo -ne "\r⏰ Runner alive for another ${HOURS}h ${MINUTES}m ${SECONDS}s... (Cancel job to stop early)   "
          sleep 10
        done
        
        echo -e "\n\n⏰ Time's up! Runner will now terminate."
